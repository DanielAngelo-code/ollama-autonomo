<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Avatar artístico do agente Ollie</title>
  <desc id="desc">Ilustração neon abstrata de um rosto de IA com formas fluidas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4ecd"/>
      <stop offset="50%" stop-color="#7a5cff"/>
      <stop offset="100%" stop-color="#27d9ff"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0ff"/>
      <stop offset="100%" stop-color="#d9f4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="320" height="320" rx="72" fill="#120c2a"/>
  <circle cx="86" cy="84" r="92" fill="url(#bg)" opacity=".45"/>
  <circle cx="255" cy="240" r="110" fill="#2dd8ff" opacity=".22"/>

  <path d="M72 188c10-66 42-112 89-112s80 43 84 106c3 42-22 73-84 73s-95-33-89-67z"
        fill="url(#face)" filter="url(#glow)"/>

  <ellipse cx="128" cy="165" rx="20" ry="14" fill="#1d255f"/>
  <ellipse cx="196" cy="165" rx="20" ry="14" fill="#1d255f"/>
  <circle cx="128" cy="165" r="5" fill="#39f2ff"/>
  <circle cx="196" cy="165" r="5" fill="#39f2ff"/>

  <path d="M126 208c16 10 52 10 68 0" stroke="#27346f" stroke-width="8" stroke-linecap="round"/>
  <path d="M158 65v26" stroke="#39f2ff" stroke-width="8" stroke-linecap="round"/>
  <circle cx="158" cy="52" r="11" fill="#39f2ff"/>
</svg>
