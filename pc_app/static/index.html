<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Ollama - Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <header>
        <div class="agent-hero">
            <img
                src="/static/agent-face.svg"
                alt="Rosto do agente virtual Ollie"
                class="agent-avatar"
                width="96"
                height="96"
            />
            <div>
                <h1>Agent Ollama - PC App</h1>
                <p>Servidor local para enviar prompts ao Ollama, ver a resposta em texto e ouvir o áudio.</p>
            </div>
        </div>
    </header>

    <main class="layout">
        <div class="content-column">
            <section class="panel">
            <h2>Envie uma instrução</h2>
            <textarea id="prompt" placeholder="Digite sua instrução para o bot..."></textarea>
            <div class="controls">
                <button id="sendButton">Enviar</button>
                <button id="refreshModels">Atualizar Modelos</button>
            </div>
            <div id="responseSection" class="response hidden">
                <h3>Conversa</h3>
                <div id="chatLog" class="chat-log"></div>
                <audio id="audioPlayer" controls class="hidden"></audio>
                <div id="responseError" class="error"></div>
            </div>
            </section>

            <section class="panel">
                <h2>Modelos e Vozes</h2>
                <div class="info-block">
                    <button id="fetchModels">Listar Modelos Ollama</button>
                    <ul id="modelList"></ul>
                </div>
                <div class="info-block">
                    <button id="fetchVoices">Listar Vozes TTS</button>
                    <ul id="voiceList"></ul>
                </div>
            </section>
        </div>

        <aside class="panel settings-panel">
            <h2>Configurações do Bot</h2>
            <div class="form-grid">
                <label>Nome do usuário</label>
                <input id="userName" type="text" />
                <label>Modelo Ollama</label>
                <input id="modelName" type="text" />
                <label>Habilitar TTS</label>
                <input id="ttsEnabled" type="checkbox" />
                <label>Motor TTS</label>
                <input value="Coqui TTS" disabled />
                <label>Mostrar pensamentos</label>
                <input id="showThoughts" type="checkbox" />
            </div>
            <div class="controls">
                <button id="saveSettings">Salvar Configurações</button>
                <button id="loadSettings">Recarregar Configurações</button>
                <button id="closeDrawer">Fechar</button>
            </div>
            <div id="settingsStatus" class="status"></div>
        </aside>
    </main>

    <footer>
        <p>Abra o navegador em <strong>http://127.0.0.1:5000</strong> após iniciar <code>python pc_app/server.py</code>.</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
