<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Ollama - Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <header class="topbar">
        <button id="menuButton" class="menu-button" aria-label="Abrir configurações">☰</button>
        <div class="brand">
            <img src="/static/agent-face.svg" alt="Avatar artístico do bot" class="agent-avatar" width="56" height="56" />
            <div>
                <h1>Ollie Chat</h1>
                <p>Converse com o assistente local em tempo real.</p>
            </div>
        </div>
    </header>

    <main class="chat-shell">
        <section id="responseSection" class="response">
            <div id="chatLog" class="chat-log"></div>
            <audio id="audioPlayer" controls class="hidden"></audio>
            <div id="responseError" class="error"></div>
        </section>
    </main>

    <footer class="composer">
        <textarea id="prompt" placeholder="Digite sua instrução..." rows="2"></textarea>
        <button id="sendButton">Enviar</button>
    </footer>

    <aside id="settingsDrawer" class="settings-drawer hidden">
        <div class="panel">
            <h2>Configurações</h2>
            <div class="form-grid">
                <label>Nome do usuário</label>
                <input id="userName" type="text" />
                <label>Modelo Ollama</label>
                <input id="modelName" type="text" />
                <label>Habilitar TTS</label>
                <input id="ttsEnabled" type="checkbox" />
                <label>Motor TTS</label>
                <select id="ttsEngine">
                    <option value="local">Local (pyttsx3)</option>
                    <option value="elevenlabs">ElevenLabs</option>
                </select>
                <label>Voz TTS</label>
                <input id="ttsVoice" type="text" />
                <label>Chave ElevenLabs</label>
                <input id="ttsApiKey" type="password" />
                <label>Mostrar pensamentos</label>
                <input id="showThoughts" type="checkbox" />
            </div>
            <div class="controls">
                <button id="saveSettings">Salvar Configurações</button>
                <button id="loadSettings">Recarregar Configurações</button>
                <button id="closeDrawer">Fechar</button>
            </div>
            <div id="settingsStatus" class="status"></div>
            <div class="controls">
                <button id="fetchModels">Listar Modelos Ollama</button>
                <button id="fetchVoices">Listar Vozes TTS</button>
            </div>
            <ul id="modelList"></ul>
            <ul id="voiceList"></ul>
        </div>
    </aside>

    <script src="/static/app.js"></script>
</body>
</html>
